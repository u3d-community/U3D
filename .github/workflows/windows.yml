name: 🖳 Windows
on: [push, pull_request]

concurrency:
  group: ci-${{github.actor}}-${{github.head_ref || github.run_number}}-${{github.ref}}-windows
  cancel-in-progress: true

jobs:
  windows:
    name: Windows
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        lib-type: ${{ github.event_name == 'pull_request' && fromJSON('["static"]') || fromJSON('["static", "shared"]') }}
        build-type: ${{ github.event_name == 'pull_request' && fromJSON('["Release"]') || fromJSON('["Release", "Debug"]') }}
        architecture: ${{ github.event_name == 'pull_request' && fromJSON('["x64"]') || fromJSON('["x64", "Win32"]') }}
        graphics-api: ${{ github.event_name == 'pull_request' && fromJSON('["DX11"]') || fromJSON('["DX11", "DX9", "OpenGL"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: CMake
        run: |
          $graphicsFlags = ""
          if ("${{ matrix.graphics-api }}" -eq "DX11") {
            $graphicsFlags = "-DURHO3D_D3D11=1"
          } elseif ("${{ matrix.graphics-api }}" -eq "DX9") {
            $graphicsFlags = "-DURHO3D_OPENGL=0"
          } elseif ("${{ matrix.graphics-api }}" -eq "OpenGL") {
            $graphicsFlags = "-DURHO3D_OPENGL=1"
          }
          cmake -S . -B build -G "Visual Studio 17 2022" -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} -DURHO3D_LIB_TYPE=${{ matrix.lib-type }} -DURHO3D_PCH=OFF -DURHO3D_DEPLOYMENT_TARGET=generic -A ${{ matrix.architecture }} $graphicsFlags

      - name: Build
        run: cmake --build build --config ${{ matrix.build-type }}

      - name: Test
        run: ctest --test-dir build --output-on-failure -C ${{ matrix.build-type }}

      - name: Package
        #if: startsWith(github.ref, 'refs/tags/')
        run: cmake --build build --target package --config ${{ matrix.build-type }}

      - name: Upload packages
        #if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: 'U3D-${{ github.job }}-${{ matrix.architecture }}-${{ matrix.graphics-api }}-${{ matrix.lib-type }}-${{ matrix.build-type }}'
          path: build/*.zip
