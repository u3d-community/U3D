name: QA
on: [push, pull_request]

concurrency:
  group: ci-${{github.actor}}-${{github.head_ref || github.run_number}}-${{github.ref}}-qa
  cancel-in-progress: true

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  style:
    name: 🎨 Code Style
    runs-on: ubuntu-latest
    if: false  # Disable code style check for now
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check code style
        run: |
          # Get changed C/C++ files (excluding ThirdParty)
          changed_files=$(git diff --name-only HEAD~1 -- Source | grep -v ThirdParty | grep -E '\.(c|cpp|h|hpp)$' || true)
          if [ -n "$changed_files" ]; then
            echo "Checking files:"
            echo "$changed_files"
            echo "$changed_files" | xargs clang-format -n -Werror
          else
            echo "No C/C++ source files changed"
          fi

  lint:
    name: 🔍 Clang-Tidy
    runs-on: ubuntu-latest
    if: false  # Disable linting for now
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: qa-lint-${{ github.sha }}
          restore-keys: qa-lint-

      - name: Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache clang clang-tidy pkg-config \
            libgl1-mesa-dev libglew-dev \
            libxcursor-dev libxext-dev libxi-dev libxinerama-dev libxrandr-dev libxrender-dev libxss-dev libxxf86vm-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols \
            libasound2-dev libpulse-dev \
            libibus-1.0-dev \
            libdbus-1-dev libreadline6-dev libssl-dev libudev-dev uuid-dev

      - name: CMake
        run: |
          export CC=clang
          export CXX=clang++
          cmake -S . -B build -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DURHO3D_LIB_TYPE=shared \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: |
          # Get changed C/C++ files (excluding ThirdParty)
          changed_files=$(git diff --name-only HEAD~1 -- Source | grep -v ThirdParty | grep -E '\.(c|cpp|h|hpp)$' || true)
          if [ -n "$changed_files" ]; then
            echo "Linting files:"
            echo "$changed_files"
            echo "$changed_files" | xargs clang-tidy -p build 2>&1 | tee build/clang-tidy.out
          else
            echo "No C/C++ source files changed"
          fi

